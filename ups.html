<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatisches Öffnen</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .back-button {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 16px;
        }

        .back-button:hover {
            background-color: #0056b3;
        }

        .message {
            text-align: center;
            font-size: 20px;
            color: #333;
        }
    </style>
    <script>
        function openLinks() {
            const url = "https://leonn170709.github.io/ups.html";
            for (let i = 0; i < 200; i++) {
                window.open(url, '_blank');
            }
        }

        // Öffnet die Links direkt, wenn die Seite geladen wird
        window.onload = openLinks;
    </script>
</head>
<body>
    <!-- Zurück-Knopf oben links -->
    <a href="https://leonn170709.github.io" class="back-button">Zurück</a>

    <!-- Nachricht auf der Seite -->
    <div class="message">
        Die Links werden geöffnet. Bitte warte einen Moment ...
    </div>
</body>
</html>
